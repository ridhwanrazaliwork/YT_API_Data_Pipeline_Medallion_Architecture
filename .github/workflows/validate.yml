name: Terraform Validate & Plan

on:
  pull_request:
    paths:
      - 'terraform/**'
      - 'lambdas/**'
      - 'glue_jobs/**'
      - '.github/workflows/validate.yml'

jobs:
  validate:
    name: Validate Terraform
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: '~> 1.5.0'

      - name: Terraform fmt check
        working-directory: terraform
        run: |
          echo "Checking Terraform formatting..."
          terraform fmt -check -recursive
          if [ $? -ne 0 ]; then
            echo "❌ Terraform files are not formatted. Run: terraform fmt -recursive"
            exit 1
          fi
          echo "✅ All files are properly formatted"

      - name: Terraform init (dev)
        working-directory: terraform/environments/dev
        run: |
          echo "Initializing dev environment..."
          terraform init -backend=false
          
      - name: Terraform validate (dev)
        working-directory: terraform/environments/dev
        run: |
          echo "Validating dev environment..."
          terraform validate
          if [ $? -eq 0 ]; then
            echo "✅ Dev environment validation passed"
          else
            echo "❌ Dev environment validation failed"
            exit 1
          fi

      - name: Terraform init (prod)
        working-directory: terraform/environments/prod
        run: |
          echo "Initializing prod environment..."
          terraform init -backend=false

      - name: Terraform validate (prod)
        working-directory: terraform/environments/prod
        run: |
          echo "Validating prod environment..."
          terraform validate
          if [ $? -eq 0 ]; then
            echo "✅ Prod environment validation passed"
          else
            echo "❌ Prod environment validation failed"
            exit 1
          fi

      - name: Terraform plan (dev) - for reference
        id: plan_dev
        working-directory: terraform/environments/dev
        run: |
          echo "Planning dev environment..."
          terraform plan -json > /tmp/plan_dev.json 2>&1
          terraform plan -out=/tmp/tfplan_dev 2>&1
          echo "Plan complete"
        continue-on-error: true

      - name: Check Lambda code for syntax errors
        run: |
          echo "Checking Lambda function syntax..."
          python3 -m py_compile lambdas/youtube_api_ingestion/lambda_function.py
          python3 -m py_compile lambdas/json_to_parquet/lambda_function.py
          python3 -m py_compile lambdas/data_quality/lambda_function.py
          echo "✅ All Lambda functions have valid Python syntax"

      - name: Check Glue scripts for syntax errors
        run: |
          echo "Checking Glue job scripts syntax..."
          python3 -m py_compile glue_jobs/bronze_to_silver_statistics.py
          python3 -m py_compile glue_jobs/silver_to_gold_statistics.py
          echo "✅ All Glue scripts have valid Python syntax"

      - name: Post plan summary to PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let comment = `## Terraform Validation Results\n\n`;
            
            comment += `### ✅ Terraform Format Check\nAll files are properly formatted.\n\n`;
            comment += `### ✅ Terraform Validation (Dev)\nDev environment is valid.\n\n`;
            comment += `### ✅ Terraform Validation (Prod)\nProd environment is valid.\n\n`;
            comment += `### ✅ Lambda Syntax Check\nAll Lambda functions have valid Python syntax.\n\n`;
            comment += `### ✅ Glue Scripts Syntax Check\nAll Glue scripts have valid Python syntax.\n\n`;
            
            // Try to read plan summary if available
            if (fs.existsSync('/tmp/tfplan_dev')) {
              comment += `### Terraform Plan (Dev)\n\`\`\`\nUse 'terraform plan' locally to review full changes\n\`\`\`\n`;
            }
            
            comment += `\n**Next steps:**\n`;
            comment += `1. Review this PR\n`;
            comment += `2. Merge when approved\n`;
            comment += `3. GitHub Actions will run 'terraform plan' on merge\n`;
            comment += `4. Maintainer will approve deployment\n`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  security-check:
    name: Security Checks
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for secrets in Terraform files
        run: |
          echo "Scanning for hardcoded secrets..."
          if grep -r "sk-\|api_key\|YOUTUBE_API_KEY" terraform/ --include="*.tf" --include="*.tfvars" | grep -v "var\." | grep -v "environment"; then
            echo "⚠️  Warning: Check that secrets are not hardcoded in Terraform"
          else
            echo "✅ No obvious hardcoded secrets found in Terraform"
          fi
        continue-on-error: true

      - name: Check for secrets in Lambda code
        run: |
          echo "Scanning for hardcoded secrets in Lambda code..."
          if grep -r "AIzaSy\|sk-" lambdas/ glue_jobs/ --include="*.py" | grep -v "os.environ\|secretsmanager\|Secrets Manager"; then
            echo "❌ Found potential hardcoded API keys in code!"
            exit 1
          else
            echo "✅ No hardcoded secrets in Lambda code"
          fi
        continue-on-error: true
