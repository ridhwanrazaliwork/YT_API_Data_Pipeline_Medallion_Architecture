name: Terraform Apply

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

permissions:
  contents: read
  id-token: write

jobs:
  apply:
    name: Apply Terraform Changes
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: '~> 1.5.0'

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ap-southeast-1

      - name: Initialize Terraform (${{ github.event.inputs.environment }})
        working-directory: terraform/environments/${{ github.event.inputs.environment }}
        run: |
          echo "Initializing Terraform for ${{ github.event.inputs.environment }}..."
          terraform init \
            -backend-config="bucket=yt-pipeline-terraform-state-ap-southeast-1-v2" \
            -backend-config="key=youtube-pipeline/terraform.tfstate" \
            -backend-config="region=ap-southeast-1" \
            -backend-config="encrypt=true" \
            -backend-config="dynamodb_table=terraform-locks-v2"
          echo "✅ Terraform initialized"

      - name: Validate Terraform (${{ github.event.inputs.environment }})
        working-directory: terraform/environments/${{ github.event.inputs.environment }}
        run: |
          echo "Validating Terraform configuration..."
          terraform validate
          echo "✅ Validation passed"

      - name: Create Terraform Plan (${{ github.event.inputs.environment }})
        id: plan
        working-directory: terraform/environments/${{ github.event.inputs.environment }}
        run: |
          echo "Generating Terraform plan..."
          terraform plan -out=tfplan
          terraform show -json tfplan > tfplan.json
          echo "✅ Plan created"

      - name: Show Plan Output (${{ github.event.inputs.environment }})
        working-directory: terraform/environments/${{ github.event.inputs.environment }}
        run: |
          echo "## Terraform Plan for ${{ github.event.inputs.environment }}"
          terraform show tfplan
          echo ""
          echo "Review the plan above. If correct, the workflow will apply changes."

      - name: Apply Terraform (${{ github.event.inputs.environment }})
        id: apply
        working-directory: terraform/environments/${{ github.event.inputs.environment }}
        run: |
          echo "Applying Terraform changes to ${{ github.event.inputs.environment }}..."
          terraform apply -auto-approve tfplan
          echo "✅ Terraform apply completed"

      - name: Package Lambda Functions
        run: |
          echo "Packaging Lambda functions..."
          cd lambdas/youtube_api_ingestion && zip -r ../lambda-ingestion.zip . && cd ../..
          cd lambdas/json_to_parquet && zip -r ../lambda-transform.zip . && cd ../..
          cd lambdas/data_quality && zip -r ../lambda-quality.zip . && cd ../..
          echo "✅ Lambda functions packaged"

      - name: Upload Lambda Zips to S3
        run: |
          echo "Uploading Lambda function zips to S3..."
          BUCKET="rid-yt-pipeline-script-ap-southeast-1-${{ github.event.inputs.environment }}-v2"
          aws s3 cp lambdas/lambda-ingestion.zip s3://$BUCKET/
          aws s3 cp lambdas/lambda-transform.zip s3://$BUCKET/
          aws s3 cp lambdas/lambda-quality.zip s3://$BUCKET/
          echo "✅ Lambda zips uploaded to s3://$BUCKET/"

      - name: Update Lambda Function Code
        run: |
          echo "Updating Lambda function code from S3..."
          ENV="${{ github.event.inputs.environment }}"
          
          # Update ingestion Lambda
          aws lambda update-function-code \
            --function-name ${ENV}-yt-ingestion \
            --s3-bucket rid-yt-pipeline-script-ap-southeast-1-${ENV}-v2 \
            --s3-key lambda-ingestion.zip
          
          # Update transform Lambda
          aws lambda update-function-code \
            --function-name ${ENV}-yt-transform \
            --s3-bucket rid-yt-pipeline-script-ap-southeast-1-${ENV}-v2 \
            --s3-key lambda-transform.zip
          
          # Update quality Lambda
          aws lambda update-function-code \
            --function-name ${ENV}-yt-quality \
            --s3-bucket rid-yt-pipeline-script-ap-southeast-1-${ENV}-v2 \
            --s3-key lambda-quality.zip
          
          echo "✅ Lambda functions updated"

      - name: Upload Glue Job Scripts to S3
        run: |
          echo "Uploading Glue job scripts to S3..."
          BUCKET="rid-yt-pipeline-script-ap-southeast-1-${{ github.event.inputs.environment }}-v2"
          aws s3 cp glue_jobs/bronze_to_silver_statistics.py s3://$BUCKET/
          aws s3 cp glue_jobs/silver_to_gold_analytics.py s3://$BUCKET/
          echo "✅ Glue scripts uploaded to s3://$BUCKET/"

      - name: Output Terraform Values (${{ github.event.inputs.environment }})
        id: output
        working-directory: terraform/environments/${{ github.event.inputs.environment }}
        run: |
          echo "Retrieving outputs..."
          terraform output -json > outputs.json
          
          # Pretty print for logs
          echo ""
          echo "=== Deployment Summary ==="
          terraform output deployment_summary 2>/dev/null || echo "Deployment complete"
          echo ""

      - name: Create Deployment Summary
        if: always()
        run: |
          {
            echo "## ✅ Deployment Complete"
            echo ""
            echo "### Environment: ${{ github.event.inputs.environment }}"
            echo "### Status: ${{ job.status }}"
            echo ""
            echo "### Infrastructure Created/Modified:"
            echo "**Networking:**"
            echo "- VPC with public subnet"
            echo "- Internet Gateway"
            echo "- Security Groups (Ingestion, Quality)"
            echo ""
            echo "**Identity & Access:**"
            echo "- Lambda execution role (with S3, Glue, Athena, SNS, Secrets Manager access)"
            echo "- Glue execution role (with S3 access to all data layers)"
            echo "- Step Functions execution role (with Lambda, Glue, SNS permissions)"
            echo ""
            echo "**Compute & Orchestration:**"
            echo "- 3 Lambda functions (ingestion, transform, quality)"
            echo "- 2 Glue ETL jobs (bronze→silver, silver→gold)"
            echo "- Step Functions state machine (pipeline orchestration)"
            echo ""
            echo "**Data & Storage:**"
            echo "- 6 S3 buckets (bronze, silver, gold, scripts, athena-results, terraform-state)"
            echo "- 3 Glue databases (bronze, silver, gold)"
            echo "- 5 Glue catalog tables (raw data, reference data, clean statistics, clean reference, analytics)"
            echo "- DynamoDB locks table for state management"
            echo ""
            echo "**Security & Monitoring:**"
            echo "- SNS topic for pipeline alerts"
            echo "- AWS Secrets Manager for YouTube API key"
            echo ""
            echo "### Next Steps:"
            echo "1. ✅ Terraform infrastructure deployed"
            echo "2. ✅ Lambda functions uploaded and updated"
            echo "3. ✅ Glue scripts uploaded"
            echo "4. Set YouTube API key in Secrets Manager:"
            echo "   \`aws secretsmanager put-secret-value --secret-id dev/yt-pipeline/youtube-api-key-XXXX --secret-string 'YOUR_API_KEY'\`"
            echo "5. Manually trigger Step Functions execution to test pipeline"
            echo "6. Monitor CloudWatch logs for errors"
            echo ""
            echo "### Verification Commands:"
            echo "\`\`\`bash"
            echo "# Check Lambda functions"
            echo "aws lambda list-functions --query 'Functions[?contains(FunctionName, \`yt-\`)]' --region ap-southeast-1"
            echo ""
            echo "# Check Glue jobs"
            echo "aws glue get-jobs --region ap-southeast-1"
            echo ""
            echo "# Check S3 buckets"
            echo "aws s3 ls | grep 'rid-yt-pipeline\\|yt-pipeline'"
            echo ""
            echo "# Check SNS topics"
            echo "aws sns list-topics --region ap-southeast-1"
            echo "\`\`\`"
          } >> $GITHUB_STEP_SUMMARY

      - name: Notify on Failure
        if: failure()
        run: |
          echo "❌ Deployment failed for ${{ github.event.inputs.environment }}"
          echo ""
          echo "### Troubleshooting:"
          echo "1. Check AWS credentials: \`aws sts get-caller-identity\`"
          echo "2. Verify IAM permissions for deploying Lambda and Glue"
          echo "3. Check S3 bucket names are correct (-v2 suffix)"
          echo "4. Review full logs above for specific errors"
          echo "5. If Terraform state is locked, check for concurrent applies"

      - name: Unlock State on Failure
        if: failure()
        working-directory: terraform/environments/${{ github.event.inputs.environment }}
        run: |
          echo "⚠️  State lock detected. Checking lock status..."
          LOCK_ID=$(terraform force-unlock -force 2>&1 | grep 'LockId' || echo '')
          if [ -z "$LOCK_ID" ]; then
            echo "Could not determine LockId. Run manually: terraform force-unlock <LOCK_ID>"
          else
            echo "Lock ID: $LOCK_ID"
            echo "To unlock: terraform force-unlock $LOCK_ID"
          fi
        continue-on-error: true
